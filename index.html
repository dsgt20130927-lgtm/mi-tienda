<!DOCTYPE html>
<html>
<head>
  <title>Mi Tienda</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
    }

    header {
      background: #ff4d4d;
      color: white;
      padding: 15px;
      font-size: 24px;
      text-align: center;
    }

    .contenedor {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px;
    }

    .producto {
      background: white;
      width: 180px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      overflow: hidden;
      text-align: center;
    }

    .producto img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .producto h3 {
      margin: 10px 0;
    }

    .precio {
      color: red;
      font-weight: bold;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 10px;
      width: 90%;
      margin-bottom: 10px;
      border-radius: 5px;
      cursor: pointer;
    }

  </style>
</head>
<body>

<header>🛒 Mi Tienda</header>

<div class="contenedor">

  <div class="producto">
    <img src="https://via.placeholder.com/200">
    <h3>Zapatos</h3>
    <p class="precio">$50.000</p>
    <a href="https://wa.me/573001234567">
      <button>Comprar</button>
    </a>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/200">
    <h3>Camiseta</h3>
    <p class="precio">$30.000</p>
    <a href="https://wa.me/573001234567">
      <button>Comprar</button>
    </a>
  </div>

</div>

</body>
</html>
